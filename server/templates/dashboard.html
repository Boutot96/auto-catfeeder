<!DOCTYPE html>
<html>
<head>
    <title>Cat Feeder Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: #fff; }
        h1 { color: #ff9f43; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #ff9f43; color: #000; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        tr:hover { background: #2a2a2a; }
        .cat { color: #ff9f43; font-weight: bold; }
        .status { color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🐱 Cat Feeder Dashboard</h1>
    <img src="/video_feed" width="640" height="480" />
    <button onclick="manualFeed()">🐱 Manual Feed</button>

    <script>
    function manualFeed() {
        fetch('/manual_feed', { method: 'POST' })
            .then(r => r.json())
            .then(() => alert('Feed triggered!'));
    }
    </script>
    <p class="status">Last updated: <span id="lastUpdated">--</span></p>
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Event</th>
                <th>Cat</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody id="eventTable">
        </tbody>
    </table>

    <script>
        function fetchEvents() {
            fetch('/events')
                .then(r => r.json())
                .then(events => {
                    const table = document.getElementById('eventTable');
                    table.innerHTML = '';
                    events.slice().reverse().forEach(e => {
                        table.innerHTML += `
                            <tr>
                                <td>${e.timestamp || '--'}</td>
                                <td>${e.type || '--'}</td>
                                <td class="cat">${e.cat || '--'}</td>
                                <td>${e.details || '--'}</td>
                            </tr>`;
                    });
                    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
                });
        }

        fetchEvents();
        setInterval(fetchEvents, 1000);
    </script>
</body>
</html>
